<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny LMS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Lora", serif;
        font-weight: 400;
        box-sizing: border-box;
        corner-shape: squircle;
      }
      html {
        --black: #0C0C09;
        --gray-1: #1D1D16;
        --gray-2: #2B2B22;
        --gray-3: #5B5B4B;
        --gray-4: #7C7C67;
        --gray-5: #ABAB9C;
        --gray-6: #E8E8E3;
        --gray-7: #F4F4F0;
        --white: #FBFBF9;
        --gradient-1: linear-gradient(to bottom, #FBFBF90D, #FBFBF906);
        --gradient-2: linear-gradient(to bottom, #FBFBF91A, #FBFBF90D);
        --gradient-3: linear-gradient(to bottom, #FBFBF926, #FBFBF91A);
      }
      body {
        font-size: 1.125rem;
        color: var(--white);
        background-color: var(--black);
      }
      h1 {
        margin: 2rem 0;
        font-size: 3rem;
        text-align: center;
      }
      h2 {
        margin-bottom: 1.5rem;
      }
      a {
        color: var(--gray-4);
      }
      .container {
        max-width: 33rem;
        margin: 0 auto 6rem auto;
        padding: 0.5rem;
      }
      section > form {
        display: grid;
        grid-template-columns: 10rem 1fr;
        gap: 1rem 0.5rem;
        align-items: center;
        margin-left: -11rem;
        margin-bottom: 2rem;
      }
      input, label {
        display: block;
        width: 100%;
        padding: 0.75rem;
        font-family: sans-serif;
        font-size: 1rem;
        border: 1px solid var(--gray-2);
        border-radius: 6rem;
        color: var(--gray-5);
        background: var(--gradient-1);
        box-shadow: inset 0 0 0 2px var(--black);
      }
      input:focus {
        outline: none;
        border-color: var(--white);
      }
      label {
        padding: 0.8rem;
        font-size: 0.9rem;
        font-weight: 500;
        text-align: center;
        background: var(--gradient-2);
      }
      form button, form .split {
        grid-column: 2;
      }
      .split {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      @media (width < 56rem) {
        section > form {
          margin-left: 0;
        }
      }
      @media (width < 28rem) {
        section > form {
          grid-template-columns: 5rem 1fr;
          gap: 0.5rem;
        }
        label {
          padding: 0.85rem;
          font-size: 0.7rem;
        }
        form .split {
          flex-direction: column;
          align-items: start;
        }
      }
      button, .btn, select {
        appearance: none;
        text-decoration: none;
        display: block;
        width: max-content;
        min-width: 160px;
        padding: 0.75rem 1.5rem;
        font-family: sans-serif;
        font-size: 1rem;
        border: 1px solid var(--gray-2);
        border-radius: 6rem;
        color: var(--white);
        background: var(--gradient-2);
        box-shadow: inset 0 0 0 2px var(--black);
        cursor: pointer;
      }
      button:hover, .btn:hover, select:hover {
        border-color: var(--gray-3);
        background: var(--gradient-3);
      }
      button:focus, .btn:focus {
        outline: none;
        border-color: var(--white);
      }
      nav {
        margin-bottom: 2rem;
      }
      nav ul {
        list-style: none;
        display: flex;
        justify-content: space-around;
        padding: 2px;
        border: 1px solid var(--gray-2);
        border-radius: 6rem;
      }
      nav li {
        display: block;
        flex: 1;
      }
      nav a {
        text-decoration: none;
        display: block;
        width: 100%;
        padding: 0.5rem;
        font-size: 1rem;
        text-align: center;
        color: var(--white);
        background: var(--gradient-2);
      }
      nav li:first-child a {
        border-radius: 6rem 0 0 6rem;
      }
      nav li:last-child a {
        border-radius: 0 6rem 6rem 0;
      }
      nav a:hover, nav a.active {
        background: var(--gradient-3);
      }
      select {
        width: 100%;
        margin-bottom: 2px;
      }
      section, .render {
        animation: slideIn 300ms ease-out forwards;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0px);
        }
      }
      [data-role] {
        display: none;
      }
      [data-role].active {
        display: block;
      }
      .ok, .fail {
        grid-column: 2;
        width: max-content;
        padding: 0.5rem;
        animation: slideIn .3s ease-out forwards;
        border-radius: 6rem;
        color: #FFCA16;
        background-color: #211100;
      }
      .ok {
        color: #3DD78C;
        background-color: #0C281C;
      }
      #curso {
        margin-top: 2rem;
      }
      .curso-item {
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 0 1rem 2rem 1rem;
        text-align: center;
        text-wrap: balance;
        border-bottom: 2px dashed var(--gray-1);
      }
      .curso-item > *:not(.btn) {
        padding: 0.5rem;
      }
      .curso-item span:first-of-type {
        border-right: 1px solid var(--gray-1);
        justify-self: end;
      }
      .curso-item span:last-of-type {
        border-left: 1px solid var(--gray-1);
        justify-self: start;
      }
      .curso-item h2,
      .curso-item p,
      .curso-item .btn {
        grid-column: 1/-1;
      }
      .curso-item .btn {
        justify-self: center;
        margin-top: 1rem;
      }
      .curso-item h2 {
        margin: 1rem 0 0 0;
      }
      .curso-item p,
      .curso-item span {
        color: var(--gray-5);
      }
    </style>
  </head>
  <body>
    <h1>Tiny LMS</h1>
    <div class="container">
      <nav data-role="public">
        <ul>
          <li><a href="#/login">Login</a></li>
          <li><a href="#/criar-conta">Criar</a></li>
        </ul>
      </nav>
      <nav data-role="user">
        <ul>
          <li><a href="#/cursos">Cursos</a></li>
          <li><a href="#/certificados">Certificados</a></li>
          <li><a href="#/sair">Sair</a></li>
        </ul>
      </nav>
      <nav data-role="admin">
        <ul>
          <li><a href="#/criar-curso">Cursos</a></li>
          <li><a href="#/criar-aula">Aulas</a></li>
          <li><a href="#/usuarios">Usuários</a></li>
          <li><a href="#/sair">Sair</a></li>
        </ul>
      </nav>
      <section id="login" data-role="public">
        <h2>Login</h2>
        <form>
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" />
          <label for="password">Senha</label>
          <input type="password" name="password" id="password" />
          <div class="split">
            <button>Login</button>
            <a href="#/recuperar">Recuperar Senha</a>
          </div>
        </form>
      </section>
      <section id="recuperar" data-role="public">
        <h2>Esqueceu a senha?</h2>
        <form>
          <label for="email-recuperar">E-mail</label>
          <input type="email" name="email" id="email-recuperar" />
          <button>Recuperar</button>
        </form>
      </section>
      <section id="resetar" data-role="public">
        <h2>Resetar Senha</h2>
        <form>
          <label for="reset-new-password">Nova Senha</label>
          <input type="password" name="reset_new_password" id="reset-new-password" />
          <input type="hidden" name="token" />
          <button>Resetar</button>
        </form>
      </section>
      <section id="criar-conta" data-role="public">
        <h2>Criar Conta</h2>
        <form>
          <label for="name-criar">Nome</label>
          <input type="text" name="name" id="name-criar" />
          <label for="username-criar">Nome de usuário</label>
          <input type="text" name="username" id="username-criar" />
          <label for="email-criar">E-mail</label>
          <input type="email" name="email" id="email-criar" />
          <label for="password-criar">Senha</label>
          <input type="password" name="password" id="password-criar" />
          <button>Criar Conta</button>
        </form>
      </section>
      <section id="criar-curso" data-role="admin">
        <div class="render"></div>
        <form>
          <label for="slug-curso">Slug</label>
          <input type="text" name="slug" id="slug-curso" />
          <label for="title-curso">Título</label>
          <input type="text" name="title" id="title-curso" />
          <label for="description-curso">Descrição</label>
          <input type="text" name="description" id="description-curso" />
          <label for="lessons-curso">Aulas</label>
          <input type="number" name="lessons" id="lessons-curso" />
          <label for="hours-curso">Horas</label>
          <input type="number" name="hours" id="hours-curso" />
          <button>Criar/Atualizar Curso</button>
        </form>
      </section>
      <section id="criar-aula" data-role="admin">
        <div class="render"></div>
        <form>
          <label for="course-slug-aula">Curso</label>
          <input type="text" name="courseSlug" id="course-slug-aula" />
          <label for="slug-aula">Slug</label>
          <input type="text" name="slug" id="slug-aula" />
          <label for="title-aula">Título</label>
          <input type="text" name="title" id="title-aula" />
          <label for="description-aula">Descrição</label>
          <input type="text" name="description" id="description-aula" />
          <label for="seconds-aula">Segundos</label>
          <input type="number" name="seconds" id="seconds-aula" />
          <label for="order-aula">Segundos</label>
          <input type="number" name="order" id="order-aula" />
          <label for="free-aula">Gratuita</label>
          <input type="number" name="free" id="free-aula" value="0" />
          <label for="file">Vídeo</label>
          <input type="file" name="file" id="file" />
          <label for="video-aula">Caminho do Vídeo</label>
          <input type="text" name="video" id="video-aula" />
          <button>Criar/Atualizar Aula</button>
        </form>
      </section>
      <section id="cursos" data-role="user">
        <div class="render"></div>
      </section>
      <section id="curso" data-role="user">
        <div class="render"></div>
      </section>
      <section id="aula" data-role="user">
        <div class="render"></div>
      </section>
      <section id="certificados" data-role="user">
        <div class="render"></div>
      </section>
      <section id="usuarios" data-role="admin">
        <form>
          <label for="search">Buscar:</label>
          <input type="text" name="search" id="search" />
          <label for="page">Página</label>
          <input type="number" name="page" id="page" value="1" />
          <button class="hidden">Buscar</button>
        </form>
      </section>
    </div>
    <script>
      const scape = (value) => String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt")
        .replaceAll("'", "#39;")
        .replaceAll('"', "&quot;");

      const routes = document.querySelectorAll("section[data-role]");
      const navs = document.querySelectorAll("nav[data-role]");

      function handleUserNav(user) {
        for(const nav of navs) {
          if(nav.dataset.role === user) {
            nav.classList.add("active");
          } else {
            nav.classList.remove("active");
          };
        };
      };

      let user;
      async function getUser() {
        user = "public";
        try {
          const response = await fetch("/auth/session");
          const body = await response.json();
          if(!response.ok) throw new Error();
          user = body.role;
          return user;
        } catch(error) {
          return user;
        } finally {
          handleUserNav(user);
        };
      };

      async function router() {
        if(user === undefined) user = await getUser();
        routes.forEach(item => item.classList.remove("active"));
        const route = location.hash.replace("#/", "").split("/").shift();
        const section = document.getElementById(route);
        if(section) {
          if(user !== section.dataset.role) location.hash = "/login";
          section.classList.add("active");
          if(typeof data[route] === "function") data[route](section);
        }
      };
      window.addEventListener("hashchange", router);
      window.addEventListener("DOMContentLoaded", router);

      async function getData(url, callback) {
        const response = await fetch(url);
        const body = await response.json();
        callback(body, response);
      };

      const data = {
        cursos: (section) => {
          getData("/lms/courses", (courses) => {
            const render = section.querySelector(".render");
            render.innerHTML = "";
            let html = "";
            for (const course of courses) {
              html += /*html*/`
                <div class="curso-item">
                  <h2>${ scape(course.title) }</h2>
                  <p>${ scape(course.description) }</p>
                  <span>Aulas: ${ scape(course.lessons) }</span>
                  <span>Horas: ${ scape(course.hours) }</span>
                  <a href="#/curso/${ scape(course.slug) }" class="btn">${ scape(course.title) }</a>
                </div>
              `;
            };
            render.innerHTML = html;
          });
        },
        certificados: (section) => {
          console.log("RENDERIZAR CERTIFICADOS");
        }
      };

      async function sendForm(method, url, id, callback) {
        const form = document.querySelector(`#${id} form`);
        form?.addEventListener("submit", async (event) => {
          event.preventDefault();
          const data = new FormData(form);
          let response;
          let body = {};
          const badge = document.createElement("div");
          try {
            response = await fetch(url, {
              method,
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify(Object.fromEntries(data))
            });
            body = await response.json();
            if(!response.ok) throw new Error();
            if(typeof callback === "function") callback(response, body);
            badge.innerText = `${ response.status }`
            badge.classList.add("ok");
          } catch (error) {
            badge.innerText = `${ response.status } - ${ body?.title }`
            badge.classList.add("fail");
          } finally  {
            form.append(badge);
            setTimeout(() => {
              badge?.remove();
            }, 1500);
          }
        });
      };

      sendForm("POST", "/auth/login", "login", async () => {
        user = await getUser();
        if(user === "user") location.hash = "/cursos";
        if(user === "admin") location.hash = "/criar-curso";
      });

      sendForm("POST", "/auth/user", "criar-conta", () => {
        location.hash = "/login";
      });
    </script>
  </body>
</html>
